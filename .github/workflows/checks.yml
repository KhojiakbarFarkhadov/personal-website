name: Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: npx --yes html-validate index.html

  link-check:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude 'linkedin\.com'
            --exclude 'google\.com/s2/favicons'
            index.html
          fail: true
